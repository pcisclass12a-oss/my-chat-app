<!DOCTYPE html>
<html>

<head>
  <title>Raayn Chat 🔥</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
    }

    input,
    button {
      padding: 10px;
      margin: 5px;
      border: none;
      border-radius: 6px;
    }

    button {
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    #login,
    #chatUI {
      padding: 20px;
    }

    #container {
      display: flex;
      height: 85vh;
    }

    #users {
      width: 30%;
      border-right: 1px solid #333;
      overflow-y: auto;
    }

    #chat {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msgMe {
      text-align: right;
      margin: 5px;
    }

    .msgOther {
      text-align: left;
      margin: 5px;
    }

    .user {
      padding: 10px;
      border-bottom: 1px solid #222;
      cursor: pointer;
    }

    .user:hover {
      background: #1e293b;
    }

    #adminPanel {
      background: #111;
      padding: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div id="login">
    <h2>🔐 Login</h2>
    <input id="email" placeholder="Email"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button onclick="login()">Login</button>
  </div>

  <div id="chatUI" style="display:none;">
    <h2>💬 Private Chat</h2>
    <button onclick="logout()">Logout</button>

    <div id="adminPanel" style="display:none;">
      <h3>👑 Admin Panel</h3>
      <input id="newEmail" placeholder="User email">
      <input id="newPass" type="password" placeholder="Password">
      <button onclick="createUser()">Create</button>
    </div>

    <div id="container">
      <div id="users"></div>

      <div id="chat">
        <div id="messages"></div>
        <div>
          <input id="msg" placeholder="Type message..." style="width:70%;">
          <button onclick="send()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-functions.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "REPLACE_API_KEY",
      authDomain: "REPLACE_DOMAIN",
      projectId: "REPLACE_PROJECT_ID"
    };

    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();
    const functions = firebase.functions();

    let currentChatId = "";

    function login() {
      auth.signInWithEmailAndPassword(email.value, password.value)
        .catch(e => alert(e.message));
    }

    function logout() { auth.signOut(); }

    auth.onAuthStateChanged(async user => {
      if (user) {
        login.style.display = "none";
        chatUI.style.display = "block";

        db.collection("users").doc(user.uid).set({ email: user.email });
        loadUsers();

        const doc = await db.collection("admins").doc(user.uid).get();
        if (doc.exists) { adminPanel.style.display = "block"; }

      } else {
        login.style.display = "block";
        chatUI.style.display = "none";
      }
    });

    function loadUsers() {
      db.collection("users").get().then(snap => {
        users.innerHTML = "";
        snap.forEach(doc => {
          if (doc.id !== auth.currentUser.uid) {
            users.innerHTML += `<div class="user" onclick="startChat('${doc.id}')">${doc.data().email}</div>`;
          }
        });
      });
    }

    function startChat(otherUid) {
      const myUid = auth.currentUser.uid;
      currentChatId = [myUid, otherUid].sort().join("_");

      db.collection("chats").doc(currentChatId).set({
        participants: [myUid, otherUid]
      });

      loadMessages();
    }

    function send() {
      if (!currentChatId) return alert("Select user");

      db.collection("chats")
        .doc(currentChatId)
        .collection("messages")
        .add({
          text: msg.value,
          sender: auth.currentUser.uid,
          time: Date.now()
        });

      msg.value = "";
    }

    function loadMessages() {
      db.collection("chats")
        .doc(currentChatId)
        .collection("messages")
        .orderBy("time")
        .onSnapshot(snap => {
          messages.innerHTML = "";
          snap.forEach(doc => {
            const d = doc.data();
            if (d.sender === auth.currentUser.uid) {
              messages.innerHTML += `<div class="msgMe">${d.text}</div>`;
            } else {
              messages.innerHTML += `<div class="msgOther">${d.text}</div>`;
            }
          });
        });
    }

    async function createUser() {
      const create = functions.httpsCallable("createUser");
      try {
        await create({ email: newEmail.value, password: newPass.value });
        alert("User created");
      } catch (e) { alert(e.message); }
    }
  </script>

</body>

</html>
