<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real-time Chat with DMs</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  </head>
  <body>
    <!-- Notification Sound -->
    <audio id="notification-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="app">
      <!-- Login Screen -->
      <div id="login-screen" class="screen">
        <div class="glass-panel">
          <h1>Welcome</h1>
          <p>Sign in to start chatting</p>
          <form id="auth-form">
            <div class="input-group">
              <label for="email">Email</label>
              <input type="email" id="email" required placeholder="you@example.com" />
            </div>
            <div class="input-group">
              <label for="password">Password</label>
              <input type="password" id="password" required placeholder="••••••••" minlength="6" />
            </div>
            <p id="auth-error" class="error-msg"></p>
            <div class="btn-group">
              <button type="submit" id="login-btn" class="btn primary">Login</button>
              <button type="button" id="signup-btn" class="btn secondary">Sign Up</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Profile Settings Modal -->
      <div id="profile-modal" class="modal hidden">
        <div class="glass-panel">
          <h2>Edit Profile</h2>
          <form id="profile-form">
            <div class="input-group">
              <label for="display-name">Display Name</label>
              <input type="text" id="display-name" placeholder="E.g. CoolUser99" />
            </div>
            <div class="input-group">
              <label for="photo-url">Profile Photo URL</label>
              <input type="url" id="photo-url" placeholder="https://example.com/photo.png" />
              <small style="color: var(--text-secondary); font-size: 0.75rem; margin-top: 4px; display: block;">Paste an image link. Leave blank to use a generated avatar.</small>
            </div>
            <div class="btn-group" style="flex-direction: row; justify-content: flex-end; margin-top: 20px;">
              <button type="button" id="close-modal-btn" class="btn secondary">Cancel</button>
              <button type="submit" id="save-profile-btn" class="btn primary">Save Changes</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Chat Screen -->
      <div id="chat-screen" class="screen hidden layout-app">
        
        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="sidebar-header">
            <div class="current-user-profile" id="open-profile-btn" style="cursor: pointer;" title="Edit Profile">
              <div class="avatar-container">
                <img id="current-user-avatar" src="" alt="Avatar" class="avatar-small">
                <div class="status-indicator online"></div>
              </div>
              <div class="user-info">
                <span class="user-name" id="current-user-name">You</span>
                <span id="user-email-display" class="user-email-display"></span>
              </div>
            </div>
            <button id="logout-btn" class="btn secondary small" aria-label="Logout" title="Logout">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M16 17L21 12L16 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>

          <div class="sidebar-content">
            <button id="global-chat-btn" class="channel-btn active">
              <span class="channel-icon">#</span> Global Chat
            </button>
            
            <div class="users-section">
              <h3>Direct Messages</h3>
              <div id="users-list" class="users-list">
                <!-- User items injected here -->
              </div>
            </div>
          </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
          <header class="chat-header">
            <div class="chat-title-container">
              <span id="chat-header-icon" class="channel-icon">#</span>
              <h2 id="chat-title">Global Chat</h2>
              <span id="chat-status-text" class="status-text hidden">Online</span>
            </div>
          </header>
          
          <div id="chat-messages" class="messages-container">
            <!-- Messages will be injected here -->
          </div>
          
          <form id="chat-form" class="message-form">
            <textarea id="message-input" placeholder="Type a message... (Shift+Enter for new line)" rows="1" required></textarea>
            <button type="submit" id="send-btn" class="btn primary send-btn" aria-label="Send">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12L2.01 3L2 10L17 12L2 14L2.01 21Z" fill="currentColor"/>
              </svg>
            </button>
          </form>
        </main>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
